<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Memory System v26.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c6a664; --ruby: #8b0000; --silver: #a8a9ad; --bg: #050505; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; font-family: 'Source Code Pro', monospace; color: white; padding: 40px 0; }
        
        .main-frame { position: relative; z-index: 10; width: 680px; padding: 30px; background: #0a0a0a; border: 2px solid var(--gold); box-shadow: 0 0 50px #000; text-align: center; }
        
        h1 { font-family: 'Cinzel'; font-size: 32px; color: #fff; letter-spacing: 5px; margin: 10px 0; text-shadow: 2px 0 var(--ruby); }
        .screen { display: none; flex-direction: column; align-items: center; }
        .active { display: flex !important; }
        
        input { background: #111; border: 1px solid var(--gold); color: #fff; padding: 15px; width: 320px; font-family: 'Source Code Pro'; font-size: 16px; text-align: center; margin: 20px 0; outline: none; }
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        .btn:hover { background: var(--gold); color: #000; }
        
        /* Grid das 40 cartas */
        .memory-game { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; margin: 20px 0; min-height: 300px; }
        .card { height: 75px; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.4s; }
        .card.flip { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid var(--gold); display: flex; justify-content: center; align-items: center; font-size: 20px; border-radius: 3px; }
        .front { background: #000; color: var(--gold); transform: rotateY(180deg); }
        .back { background: #1a1a1a; color: var(--ruby); font-weight: bold; }
        
        /* Log de Recompensas */
        .reward-registry { margin-top: 30px; padding: 20px; border: 1px dashed var(--gold); background: rgba(255,255,255,0.05); text-align: left; }
        .registry-title { font-family: 'Cinzel'; font-size: 16px; color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 12px; }
        .log-list { font-family: 'Source Code Pro'; font-size: 14px; max-height: 300px; overflow-y: auto; }
        .log-item { margin-bottom: 8px; border-left: 3px solid var(--ruby); padding-left: 10px; color: #cecece; }
        .log-item b { color: #fff; }
    </style>
</head>
<body>

    <div class="main-frame">
        <h1>Grand Design</h1>

        <div class="screen active" id="login-screen">
            <p id="status-msg" style="color: var(--silver)">IDENTIFICAÇÃO NECESSÁRIA:</p>
            <input type="text" id="player-input" placeholder="Seu Nome Aqui..." maxlength="30">
            <button class="btn" onclick="fluxoInicial()">Sincronizar</button>
        </div>

        <div class="screen" id="game-screen">
            <div class="memory-game" id="game-board"></div>
            <div class="reward-registry">
                <div class="registry-title">REGISTRO DE EXTRAÇÃO</div>
                <div class="log-list" id="reward-log">
                    <div id="wait-msg">Aguardando pareamento de dados...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let nomeUsuario = "";
        let paresAchados = 0;
        let selecionadas = [];

        // 20 Pares = 20 Prêmios
        const tabelaPremios = {
            'A': 'Ticket de Legado sem ficha', 'B': 'Núcleo de Vapor', 'C': 'Lâmina de Rubi', 'D': 'Bateria de Éter',
            'E': 'Manuscrito Arcano', 'F': 'Válvula de Ouro', 'G': 'Esquema Tático', 'H': 'Engrenagem Mestra',
            'I': 'Lente Térmica', 'J': 'Chave do Cofre', 'K': 'Frasco de Óleo', 'L': 'Lanterna Steampunk',
            'M': 'Caixa de Suprimentos', 'N': 'Bússola de Prata', 'O': 'Antena de Alcance', 'P': 'Chip Arcaico',
            'Q': 'Fragmento de Metal', 'R': 'Balança de Bronze', 'S': 'Arco Mecânico', 'T': 'Escudo Galvânico'
        };

        function fluxoInicial() {
            const val = document.getElementById('player-input').value.trim();
            if (val === "") return alert("Operador, o sistema exige um nome!");

            nomeUsuario = val;
            
            // Troca de tela forçada
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            prepararJogo();
        }

        function prepararJogo() {
            const board = document.getElementById('game-board');
            const icons = Object.keys(tabelaPremios);
            let deck = [...icons, ...icons];
            
            // Embaralhar
            deck.sort(() => Math.random() - 0.5);

            board.innerHTML = ''; // Limpa antes de gerar
            
            deck.forEach(simbolo => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = simbolo;
                card.innerHTML = `
                    <div class="front">${simbolo}</div>
                    <div class="back">?</div>
                `;
                card.onclick = function() {
                    if (selecionadas.length < 2 && !this.classList.contains('flip')) {
                        this.classList.add('flip');
                        selecionadas.push(this);
                        if (selecionadas.length === 2) setTimeout(verificar, 600);
                    }
                };
                board.appendChild(card);
            });
        }

        function verificar() {
            const [card1, card2] = selecionadas;
            if (card1.dataset.value === card2.dataset.value) {
                paresAchados++;
                gerarLog(card1.dataset.value);
            } else {
                card1.classList.remove('flip');
                card2.classList.remove('flip');
            }
            selecionadas = [];
        }

        function gerarLog(simbolo) {
            const log = document.getElementById('reward-log');
            const wait = document.getElementById('wait-msg');
            if (wait) wait.remove();

            const premio = tabelaPremios[simbolo];
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<b>${nomeUsuario}:</b> 1 ${premio}`;
            
            log.prepend(div);
        }
    </script>
</body>
</html>
