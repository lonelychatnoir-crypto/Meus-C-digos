<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE EXTRAÇÃO v27.0</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        #main-frame { width: 650px; border: 2px solid #c6a664; padding: 20px; background: #0a0a0a; text-align: center; }
        
        /* Telas */
        #login-screen { display: block; }
        #game-screen { display: none; }

        input { padding: 10px; width: 250px; margin: 10px; background: #111; border: 1px solid #c6a664; color: #fff; }
        button { padding: 10px 20px; background: #c6a664; color: #000; border: none; cursor: pointer; font-weight: bold; }

        /* Jogo */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; }
        .card { height: 60px; background: #1a1a1a; border: 1px solid #c6a664; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .card.flipped { background: #000; color: #c6a664; }

        /* Log */
        #log { margin-top: 20px; padding: 10px; border: 1px dashed #c6a664; text-align: left; max-height: 200px; overflow-y: auto; }
        .entry { border-left: 3px solid #8b0000; padding-left: 10px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="main-frame">
        <h1>GRAND DESIGN</h1>

        <div id="login-screen">
            <p>IDENTIFIQUE O OPERADOR:</p>
            <input type="text" id="nome-input" placeholder="Seu nome aqui...">
            <br>
            <button type="button" onclick="ignicao()">SINCRONIZAR SISTEMA</button>
        </div>

        <div id="game-screen">
            <div class="grid" id="tabuleiro"></div>
            <div id="log">Aguardando formação de par...</div>
        </div>
    </div>

    <script>
        let player = "";
        let acertos = 0;
        let selecionadas = [];

        // 20 Pares
        const premios = {
            'A': 'Ticket de Legado sem ficha', 'B': 'Núcleo de Vapor', 'C': 'Lâmina de Rubi', 'D': 'Bateria de Éter',
            'E': 'Manuscrito Arcano', 'F': 'Válvula de Ouro', 'G': 'Esquema Tático', 'H': 'Engrenagem Mestra',
            'I': 'Lente Térmica', 'J': 'Chave do Cofre', 'K': 'Frasco de Óleo', 'L': 'Lanterna Steampunk',
            'M': 'Caixa de Suprimentos', 'N': 'Bússola de Prata', 'O': 'Antena de Alcance', 'P': 'Chip Arcaico',
            'Q': 'Fragmento de Metal', 'R': 'Balança de Bronze', 'S': 'Arco Mecânico', 'T': 'Escudo Galvânico'
        };

        function ignicao() {
            // ALERTA DE TESTE - Se isso não aparecer, o navegador está lendo o código velho!
            console.log("Botão apertado!");
            
            const nome = document.getElementById('nome-input').value;
            if (nome.trim() === "") {
                alert("Insira um nome!");
                return;
            }

            player = nome;

            // TROCA DE TELA BRUTA
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            iniciarJogo();
        }

        function iniciarJogo() {
            const board = document.getElementById('tabuleiro');
            const icons = Object.keys(premios);
            let deck = [...icons, ...icons];
            deck.sort(() => Math.random() - 0.5);

            board.innerHTML = '';
            deck.forEach(simbolo => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = simbolo;
                card.innerHTML = '?';
                card.onclick = function() {
                    if (selecionadas.length < 2 && !this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        this.innerHTML = this.dataset.value;
                        selecionadas.push(this);
                        if (selecionadas.length === 2) setTimeout(conferir, 500);
                    }
                };
                board.appendChild(card);
            });
        }

        function conferir() {
            const [c1, c2] = selecionadas;
            if (c1.dataset.value === c2.dataset.value) {
                acertos++;
                registrar(c1.dataset.value);
            } else {
                c1.classList.remove('flipped');
                c1.innerHTML = '?';
                c2.classList.remove('flipped');
                c2.innerHTML = '?';
            }
            selecionadas = [];
        }

        function registrar(simbolo) {
            const logBox = document.getElementById('log');
            if (acertos === 1) logBox.innerHTML = ''; // Limpa o "Aguardando" no primeiro par

            const premio = premios[simbolo];
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `<b>${player}:</b> 1 ${premio}`;
            logBox.prepend(div);
        }
    </script>
</body>
</html>
