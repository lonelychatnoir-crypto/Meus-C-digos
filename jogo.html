<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Grand Design v31.0</title>
    <style>
        /* CSS PURIFICADO - SEM 3D PARA EVITAR ESPELHAMENTO */
        :root { --gold: #c6a664; --ruby: #8b0000; --silver: #a8a9ad; --bg: #050505; }
        
        body { 
            background: var(--bg) url('https://i.pinimg.com/originals/15/d0/ea/15d0ea79be5fe0a5e6d91b62a08ff3b9.gif') fixed center/cover;
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; color: white; padding: 20px;
        }
        body::before { content: ""; position: absolute; inset: 0; background: rgba(5,5,5,0.92); z-index: 1; pointer-events: none; }

        #wrapper { 
            position: relative; z-index: 10; width: 660px; padding: 30px;
            background: rgba(10, 10, 10, 0.98); border: 2px solid var(--gold);
            box-shadow: 0 0 50px #000; text-align: center; box-sizing: border-box;
        }

        h1 { font-size: 30px; letter-spacing: 5px; color: #fff; text-shadow: 2px 2px var(--ruby); margin-bottom: 20px; text-transform: uppercase; }

        /* Troca de Telas */
        .screen { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }

        input { padding: 15px; width: 280px; margin: 20px 0; background: #111; border: 1px solid var(--gold); color: #fff; text-align: center; font-size: 16px; outline: none; }
        .btn-main { padding: 12px 30px; background: var(--gold); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* Tabuleiro 2D (Sem Espelhamento) */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; width: 100%; }
        .card { 
            height: 75px; background: #1a1a1a; border: 1px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 26px; font-weight: bold; cursor: pointer; 
            color: transparent; /* Esconde o texto inicialmente */
            user-select: none; transition: background 0.2s;
        }
        .card.revealed { color: var(--gold); background: #000; }
        .card.matched { border-color: var(--ruby); opacity: 0.3; cursor: default; }

        /* Relatório Final */
        #report { 
            margin-top: 20px; padding: 25px; border: 2px dashed var(--ruby); 
            background: rgba(139, 0, 0, 0.15); width: 100%; box-sizing: border-box; 
        }
        .reward-line { font-size: 20px; color: var(--gold); margin: 10px 0; font-weight: bold; text-transform: uppercase; }
        .final-name { font-size: 22px; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="wrapper">
    <h1>GRAND DESIGN</h1>

    <div id="login-screen" class="screen active">
        <p style="color: var(--silver)">IDENTIFICAÇÃO DO INVENTOR:</p>
        <input type="text" id="user-input" placeholder="Seu nome aqui...">
        <button class="btn-main" onclick="startSystem()">Sincronizar</button>
    </div>

    <div id="game-screen" class="screen">
        <p style="font-size: 12px; color: var(--gold); margin-bottom: 10px;">EXTRAÇÃO ATIVA: ENCONTRE 3 PARES</p>
        <div id="board" class="grid"></div>
        
        <div id="report" style="display:none">
            <div class="final-name" id="res-nome"></div>
            <div id="res-premios"></div>
            <p style="font-size: 11px; color: var(--silver); margin-top: 20px;">SISTEMA ENCERRADO. TIRE PRINT PARA RESGATE.</p>
            <button class="btn-main" style="font-size: 10px; margin-top: 15px;" onclick="location.reload()">Resetar</button>
        </div>
    </div>
</div>

<script>
    let operador = "";
    let pares = 0;
    let selecionadas = [];
    let recompensas = [];
    let travado = false;

    const database = {
        'A': 'Ticket de Legado sem ficha', 'B': 'Núcleo de Vapor', 'C': 'Lâmina de Rubi', 'D': 'Bateria de Éter',
        'E': 'Manuscrito Arcano', 'F': 'Válvula de Ouro', 'G': 'Esquema Tático', 'H': 'Engrenagem Mestra',
        'I': 'Lente Térmica', 'J': 'Chave do Cofre', 'K': 'Frasco de Óleo', 'L': 'Lanterna Steampunk',
        'M': 'Caixa de Suprimentos', 'N': 'Bússola de Prata', 'O': 'Antena de Alcance', 'P': 'Chip Arcaico',
        'Q': 'Fragmento de Metal', 'R': 'Balança de Bronze', 'S': 'Arco Mecânico', 'T': 'Escudo Galvânico'
    };

    function startSystem() {
        const val = document.getElementById('user-input').value.trim();
        if(!val) return alert("Identificação necessária!");
        
        operador = val;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('board');
        const keys = Object.keys(database);
        let deck = [...keys, ...keys].sort(() => Math.random() - 0.5);

        board.innerHTML = '';
        deck.forEach(simbolo => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = simbolo;
            card.onclick = function() { 
                if(travado || selecionadas.length >= 2 || card.classList.contains('revealed')) return;
                
                card.classList.add('revealed');
                selecionadas.push({card, simbolo});

                if(selecionadas.length === 2) {
                    setTimeout(check, 600);
                }
            };
            board.appendChild(card);
        });
    }

    function check() {
        const [c1, c2] = selecionadas;
        if(c1.simbolo === c2.simbolo) {
            c1.card.classList.add('matched');
            c2.card.classList.add('matched');
            recompensas.push(database[c1.simbolo]);
            pares++;
            
            if(pares === 3) {
                travado = true;
                finish();
            }
        } else {
            c1.card.classList.remove('revealed');
            c2.card.classList.remove('revealed');
        }
        selecionadas = [];
    }

    function finish() {
        // Remove o tabuleiro para não haver mais interação
        document.getElementById('board').style.display = 'none';
        
        const report = document.getElementById('report');
        document.getElementById('res-nome').innerHTML = `OPERADOR: <b>${operador}</b>`;
        document.getElementById('res-premios').innerHTML = recompensas.map(p => `<div class="reward-line">+ ${p}</div>`).join('');
        report.style.display = 'block';
    }
</script>
</body>
</html>
